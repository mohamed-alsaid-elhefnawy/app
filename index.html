<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumora.OS - Futuristic Productivity</title>
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Header -->
        <header>
            <div class="logo">LUMORA.OS</div>
            <div class="header-actions">
                <div class="icon-btn" id="notif-btn">
                    <i data-lucide="bell" style="width: 20px; height: 20px;"></i>
                </div>
                <img src="avatar.png" alt="Profile" class="profile-avatar">
            </div>
        </header>

        <!-- Main Status Card -->
        <section class="status-section">
            <div class="status-card">
                <h2>System Online</h2>
                <div class="welcome-text">Welcome back, Agent</div>
                <div class="date-text" id="current-date">May 12, 2026 | 17:40</div>
            </div>
        </section>

        <!-- Task Input -->
        <section class="task-input-section">
            <div class="input-wrapper">
                <input type="text" id="task-input" placeholder="New objective..." autocomplete="off">
            </div>
            <button class="add-btn" id="add-task">
                <i data-lucide="plus"></i>
            </button>
        </section>

        <!-- Productivity Stats -->
        <section class="stats-section">
            <div class="stat-card progress-card">
                <div class="progress-ring">
                    <svg width="40" height="40">
                        <circle cx="20" cy="20" r="16" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="transparent" />
                        <circle id="progress-circle" cx="20" cy="20" r="16" stroke="var(--primary-cyan)" stroke-width="4" fill="transparent" 
                            stroke-dasharray="100" stroke-dashoffset="100" stroke-linecap="round" />
                    </svg>
                    <span class="progress-text">0%</span>
                </div>
                <div class="stat-label">System Progress</div>
            </div>
        </section>

        <!-- Task List -->
        <section class="task-list-section">
            <div class="section-title">
                <span>ACTIVE TASKS</span>
                <i data-lucide="filter" style="width: 16px; height: 16px; cursor: pointer;"></i>
            </div>
            <div id="task-list">
                <!-- Empty State -->
                <div id="empty-state" style="text-align: center; padding: 40px 20px; color: var(--text-dim);">
                    <i data-lucide="shield-off" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
                    <p style="font-size: 0.9rem; letter-spacing: 1px;">NO ACTIVE OBJECTIVES</p>
                </div>
            </div>
        </section>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item active">
                <i data-lucide="home"></i>
            </div>
            <div class="nav-item">
                <i data-lucide="list-todo"></i>
            </div>
            <div class="nav-item">
                <i data-lucide="timer"></i>
            </div>
            <div class="nav-item">
                <i data-lucide="bar-chart-3"></i>
            </div>
            <div class="nav-item">
                <i data-lucide="settings"></i>
            </div>
        </nav>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Update Date/Time
        function updateDateTime() {
            const now = new Date();
            const options = { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' };
            document.getElementById('current-date').innerText = now.toLocaleString('en-US', options).replace(',', ' |');
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // Task Management
        const taskInput = document.getElementById('task-input');
        const addTaskBtn = document.getElementById('add-task');
        const taskList = document.getElementById('task-list');
        const progressCircle = document.getElementById('progress-circle');
        const progressText = document.querySelector('.progress-text');

        let totalTasks = 0;
        let completedTasks = 0;

        function updateProgress() {
            const percentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);
            progressText.innerText = `${percentage}%`;
            
            // stroke-dasharray is 100
            const offset = 100 - percentage;
            progressCircle.style.strokeDashoffset = offset;
        }

        function createTask(text) {
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.remove();

            totalTasks++;
            updateProgress();

            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const taskItem = document.createElement('div');
            taskItem.className = 'task-item';
            taskItem.innerHTML = `
                <div class="task-checkbox"></div>
                <div class="task-content">
                    <div class="task-title">${text}</div>
                    <div class="task-time">${time} - Objective</div>
                </div>
                <div class="task-actions">
                    <button class="delete-task-btn">
                        <i data-lucide="trash-2" style="width: 18px; height: 18px; color: #ff4b4b;"></i>
                    </button>
                </div>
            `;
            taskList.prepend(taskItem);
            lucide.createIcons();
            
            // Checkbox logic: Toggle Completion
            taskItem.querySelector('.task-checkbox').addEventListener('click', function() {
                if (!taskItem.classList.contains('completed')) {
                    taskItem.classList.add('completed');
                    completedTasks++;
                    taskItem.style.opacity = '0.5';
                    taskItem.style.textDecoration = 'line-through';
                    taskItem.querySelector('.task-checkbox').innerHTML = '<i data-lucide="check" style="width: 14px; height: 14px; color: var(--primary-cyan);"></i>';
                } else {
                    taskItem.classList.remove('completed');
                    completedTasks--;
                    taskItem.style.opacity = '1';
                    taskItem.style.textDecoration = 'none';
                    taskItem.querySelector('.task-checkbox').innerHTML = '';
                }
                lucide.createIcons();
                updateProgress();
            });

            // Delete logic: Manual removal
            taskItem.querySelector('.delete-task-btn').addEventListener('click', function() {
                if (taskItem.classList.contains('completed')) {
                    completedTasks--;
                }
                totalTasks--;
                
                taskItem.style.transform = 'translateX(-100px)';
                taskItem.style.opacity = '0';
                
                setTimeout(() => {
                    taskItem.remove();
                    updateProgress();
                    if (taskList.children.length === 0) {
                        renderEmptyState();
                        totalTasks = 0;
                        completedTasks = 0;
                        updateProgress();
                    }
                }, 300);
            });
        }

        function renderEmptyState() {
            taskList.innerHTML = `
                <div id="empty-state" style="text-align: center; padding: 40px 20px; color: var(--text-dim);">
                    <i data-lucide="shield-off" style="width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3;"></i>
                    <p style="font-size: 0.9rem; letter-spacing: 1px;">NO ACTIVE OBJECTIVES</p>
                </div>
            `;
            lucide.createIcons();
        }

        addTaskBtn.addEventListener('click', () => {
            if (taskInput.value.trim() !== "") {
                createTask(taskInput.value);
                taskInput.value = "";
            }
        });

        taskInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && taskInput.value.trim() !== "") {
                createTask(taskInput.value);
                taskInput.value = "";
            }
        });

        // Initialize progress
        updateProgress();

        // Navigation Switching
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });

        // Notification Button Ripple Simulation
        document.getElementById('notif-btn').addEventListener('click', () => {
            alert('Security Alerts: All Systems Optimal.');
        });
    </script>
</body>
</html>
